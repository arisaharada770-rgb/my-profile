<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ありにゃんの日記 | ありにゃんの自己紹介サイト</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="diary.css">
</head>
<body>
    <nav>
        <a href="index.html">ホーム</a>
        <a href="profile.html">プロフィール</a>
        <a href="hobby.html">趣味</a>
        <a href="diary.html">日記</a>
    </nav>

    <div class="card">
        <h1>ありにゃんの日記</h1>
    </div>

    <div class="card diary-container">
        <p class="diary-intro">
            管理者アカウントでログインすると、日記を投稿・削除できます。<br>閲覧はそのまま誰でもできます。
        </p>

        <div class="auth-section">
            <h3>管理者ログイン</h3>
            <form class="auth-form" id="authForm">
                <input type="email" id="authEmail" placeholder="管理者メールアドレス" required>
                <input type="password" id="authPassword" placeholder="パスワード" required minlength="6">
                <div class="auth-actions">
                    <button type="submit" data-mode="signin">ログイン</button>
                    <button type="submit" data-mode="signup">新規登録</button>
                </div>
            </form>
            <div id="authStatus" class="auth-status">ログインしてください</div>
            <button id="signOutButton" class="auth-signout is-hidden">ログアウト</button>
        </div>

        <div class="diary-input-section">
            <h3>新しい日記を書く（ログイン中のみ投稿可）</h3>
            <form class="diary-form" id="diaryForm">
                <input 
                    type="text" 
                    id="diaryTitle" 
                    placeholder="タイトルを入力してください" 
                    required
                >
                <textarea 
                    id="diaryContent" 
                    placeholder="今日の出来事を書いてください..." 
                    required
                ></textarea>
                <button type="submit">保存する</button>
            </form>
        </div>

        <div id="diaryList" class="diary-entries">
            <p class="empty-message">まだ日記がありません。書いてみましょう！</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="diary.js?v=20260709"></script>
</body>
</html>
