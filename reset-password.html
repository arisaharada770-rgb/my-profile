<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワード再設定 | ありにゃんの自己紹介サイト</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="diary.css">
</head>
<body>
    <nav>
        <a href="index.html">ホーム</a>
        <a href="profile.html">プロフィール</a>
        <a href="hobby.html">趣味</a>
        <a href="diary.html">日記</a>
    </nav>

    <div class="card">
        <h1>パスワード再設定</h1>
        <p>パスワードを忘れてしまった場合はこちらから再設定用のメールを送信できます。メールのリンクを開いた後、新しいパスワードを登録してください。</p>
    </div>

    <div class="card diary-container">
        <div class="auth-section">
            <div id="resetNotice" class="auth-status"></div>

            <form class="auth-form" id="resetRequestForm">
                <input type="email" id="resetEmail" placeholder="登録済みのメールアドレス" required>
                <button type="submit">再設定用リンクを送信</button>
            </form>

            <form class="auth-form is-hidden" id="newPasswordForm">
                <input type="password" id="newPassword" placeholder="新しいパスワード" required minlength="6">
                <input type="password" id="confirmPassword" placeholder="新しいパスワード（確認）" required minlength="6">
                <button type="submit">新しいパスワードを設定する</button>
            </form>

            <div id="resetResult" class="auth-status"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="reset-password.js?v=20260719"></script>
</body>
</html>
